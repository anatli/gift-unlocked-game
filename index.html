<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>¡Reto de Cumpleaños!</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a2e; font-family: sans-serif; touch-action: none; }
        canvas { display: block; background: linear-gradient(to bottom, #1e3c72, #2a5298); }
        
        #ui-layer { 
            position: absolute; top: 20px; width: 100%; text-align: center; 
            color: #ffd700; font-size: 24px; font-weight: bold; pointer-events: none;
        }

        /* Pantallas de mensaje */
        .overlay {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            text-align: center; justify-content: center; align-items: center; flex-direction: column; 
            z-index: 100; padding: 20px; box-sizing: border-box;
        }

        #success-screen { background: rgba(0,0,0,0.9); color: white; }
        #loss-screen { background: rgba(139, 0, 0, 0.9); color: white; }

        button {
            padding: 15px 30px; font-size: 18px; background: #ffd700; border: none; 
            border-radius: 25px; cursor: pointer; font-weight: bold; margin-top: 20px;
        }

        .reveal-title { color: #ffd700; font-size: 2.2em; margin: 20px 0; text-transform: uppercase; }
    </style>
</head>
<body>
    <div id="ui-layer">Regalos atrapados: <span id="score-count">0</span>/10</div>
    
    <div id="success-screen" class="overlay">
        <h1 style="color: #4cd137;">¡NIVEL COMPLETADO! 🏆</h1>
        <p>Has demostrado tener unos reflejos increíbles...</p>
        <h2 class="reveal-title">✈️ ¡NOS VAMOS A FUERTEVENTURA! 🏝️</h2>
        <p>¡Feliz cumpleaños, mi amor! ❤️</p>
    </div>

    <div id="loss-screen" class="overlay">
        <h1>¡OH NO! 😱</h1>
        <p>Se te ha escapado un regalo... ¡No puedes dejar ninguno atrás!</p>
        <button onclick="resetGame()">REINTENTAR</button>
    </div>

    <canvas id="mainCanvas"></canvas>

    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score-count');
        const winScreen = document.getElementById('success-screen');
        const lossScreen = document.getElementById('loss-screen');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let score = 0;
        let isGameActive = true;
        const player = { x: canvas.width / 2 - 35, y: canvas.height - 100, width: 70, height: 70 };
        let fallingItems = [];
        let spawnTimer;

        // Control táctil
        window.addEventListener('touchmove', (e) => {
            if (!isGameActive) return;
            player.x = e.touches[0].clientX - player.width / 2;
            if (player.x < 0) player.x = 0;
            if (player.x > canvas.width - player.width) player.x = canvas.width - player.width;
        });

        function spawnItem() {
            if (!isGameActive) return;
            fallingItems.push({
                x: Math.random() * (canvas.width - 40),
                y: -50,
                speed: 3.5 + (score * 0.3), // Aumenta la velocidad según sube la puntuación
                emoji: '🎁'
            });
            spawnTimer = setTimeout(spawnItem, 1000 - (score * 50)); // Salen más rápido según avanzas
        }

        function updateGame() {
            if (!isGameActive) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Dibujar Jugador
            ctx.fillStyle = '#e84118';
            ctx.fillRect(player.x, player.y, player.width, player.height);
            ctx.fillStyle = '#fbc531';
            ctx.fillRect(player.x + 30, player.y, 10, player.height);

            for (let i = fallingItems.length - 1; i >= 0; i--) {
                const item = fallingItems[i];
                item.y += item.speed;
                
                ctx.font = '40px serif';
                ctx.fillText(item.emoji, item.x, item.y);

                // Colisión (Atrapado)
                if (item.y + 10 > player.y && item.x > player.x - 20 && item.x < player.x + player.width) {
                    fallingItems.splice(i, 1);
                    score++;
                    scoreDisplay.innerText = score;
                    if (score >= 10) triggerWin();
                } 
                // PERDER: Si el regalo toca el suelo (pasa del alto de la pantalla)
                else if (item.y > canvas.height) {
                    triggerLoss();
                }
            }
            requestAnimationFrame(updateGame);
        }

        function triggerWin() {
            isGameActive = false;
            winScreen.style.display = 'flex';
            clearTimeout(spawnTimer);
        }

        function triggerLoss() {
            isGameActive = false;
            lossScreen.style.display = 'flex';
            clearTimeout(spawnTimer);
        }

        function resetGame() {
            score = 0;
            scoreDisplay.innerText = score;
            fallingItems = [];
            isGameActive = true;
            lossScreen.style.display = 'none';
            spawnItem();
            updateGame();
        }

        spawnItem();
        updateGame();
    </script>
</body>
</html>
